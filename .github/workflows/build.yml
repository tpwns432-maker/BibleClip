name: Build and Release

# Push a tag like v1.5.4 to build the BibleClip web app (pywebview) for
# Windows + macOS and attach the zips/dmg to a GitHub Release. Or run manually
# (workflow_dispatch) to get the builds as downloadable artifacts without a
# release. (As of v1.5.4 the app is the pywebview "web" UI; the legacy
# CustomTkinter entry point bibleclip_app.py is no longer built/shipped.)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# ⚠️ kiwipiepy(형태소 검색기)는 프로즌 빌드에서 제외한다. kiwipiepy 의 C++ 네이티브
# 런타임이 동봉된 pywebview(pythonnet/WebView2)와 같은 프로세스에 공존하면 네이티브
# 힙 손상(0xC0000374)으로 앱이 즉시 강제 종료됨(검증됨). 배포본은 trigram 폴백만
# 사용(morph._get_kiwi 가 sys.frozen 에서 None). kiwipiepy 를 제외하지 않으면 morph
# import 를 따라가 kiwipiepy + torch/transformers 등 ML 스택까지 끌어와 ~1GB 폭증
# 하므로 함께 제외. 형태소 검색은 소스/개발 실행 전용.
env:
  KIWI_EXCLUDE: >-
    --exclude-module kiwipiepy --exclude-module kiwipiepy_model
    --exclude-module torch --exclude-module transformers --exclude-module cv2
    --exclude-module scipy --exclude-module sklearn --exclude-module numba
    --exclude-module llvmlite --exclude-module pandas --exclude-module matplotlib
    --exclude-module PIL --exclude-module tokenizers --exclude-module numpy
    --exclude-module lxml --exclude-module safetensors --exclude-module huggingface_hub
    --exclude-module sympy --exclude-module networkx

jobs:
  # -------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # v1.1.1: 3.12 빌드가 일부 PC에서 pythonnet/.NET CLR 초기화에 실패(미서명+환경
          # 조합). 로컬 3.13 빌드는 동일 노트북에서 정상 → CI도 3.13으로 맞춤. macOS는
          # pythonnet 무관·검증된 3.12 유지(불필요한 회귀 방지).
          python-version: '3.13'

      - name: Install deps
        # requirements.txt carries the runtime deps (incl. pyperclip — the
        # clipboard backend; without it monitoring + verse-copy silently fail).
        run: python -m pip install --upgrade pip pyinstaller==6.20.0 -r requirements.txt

      # 9차 모듈화: 분할된 web/**/*.js 문법 검증 (하나라도 깨지면 빌드 중단)
      - name: Check web JS syntax
        shell: pwsh
        run: |
          Get-ChildItem -Recurse web -Filter *.js | ForEach-Object {
            node --check $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "node --check failed: $($_.FullName)" }
          }
          Write-Host "web/**/*.js syntax OK"

      - name: Build BibleClipWeb.exe
        # pwsh 는 문자열 변수를 단어분할 없이 한 인자로 넘기므로(bash 와 다름)
        # KIWI_EXCLUDE 를 -split 로 배열화해야 PyInstaller 가 개별 플래그로 받는다.
        run: >
          python -m PyInstaller --onedir --windowed --noconfirm --clean
          --collect-submodules bibleclip --hidden-import pyperclip
          ($env:KIWI_EXCLUDE -split ' ') --add-data "web;web"
          --icon=icon.ico --name BibleClipWeb bibleclip_web.py

      - name: Assemble package
        shell: pwsh
        run: |
          $v = ([regex]::Match((Get-Content bibleclip/_version.py -Raw), '__version__\s*=\s*"(.+?)"')).Groups[1].Value
          Copy-Item icon.ico dist/BibleClipWeb/ -Force
          Copy-Item 사용법.txt dist/BibleClipWeb/ -Force
          Copy-Item 사용법.html dist/BibleClipWeb/ -Force
          Copy-Item 사용법.css dist/BibleClipWeb/ -Force
          Copy-Item 사용법.js dist/BibleClipWeb/ -Force
          Copy-Item version_changes.json dist/BibleClipWeb/ -Force
          New-Item -ItemType Directory -Force dist/BibleClipWeb/bible_versions | Out-Null
          Copy-Item bible_versions/KRV.SQLite3 dist/BibleClipWeb/bible_versions/ -Force
          New-Item -ItemType Directory -Force dist/BibleClipWeb/original_lang | Out-Null
          # Copyright guard: ship only the copyright-clean 개역한글S (KRV+Strong tags).
          # English/Korean lexicons are user-supplied modules (not redistributed).
          Copy-Item "original_lang/개역한글S.sdb" dist/BibleClipWeb/original_lang/ -Force
          Compress-Archive -Path dist/BibleClipWeb/* -DestinationPath "BibleClipWeb-windows-v$v.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: BibleClipWeb-windows-*.zip

  # -------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: python -m pip install --upgrade pip pyinstaller==6.20.0 -r requirements.txt

      # 9차 모듈화: 분할된 web/**/*.js 문법 검증 (하나라도 깨지면 빌드 중단)
      - name: Check web JS syntax
        run: |
          find web -name '*.js' -print0 | while IFS= read -r -d '' f; do
            node --check "$f" || exit 1
          done
          echo "web/**/*.js syntax OK"

      - name: Generate icns icon
        run: |
          if [ -f icon.png ]; then
            sips -s format icns icon.png --out icon.icns || echo "icns conversion failed; building without icon"
          fi

      - name: Build BibleClipWeb.app
        run: |
          if [ -f icon.icns ]; then
            python -m PyInstaller --onedir --windowed --noconfirm --clean --collect-submodules bibleclip --hidden-import pyperclip $KIWI_EXCLUDE --add-data "web:web" --icon=icon.icns --name BibleClipWeb bibleclip_web.py
          else
            python -m PyInstaller --onedir --windowed --noconfirm --clean --collect-submodules bibleclip --hidden-import pyperclip $KIWI_EXCLUDE --add-data "web:web" --name BibleClipWeb bibleclip_web.py
          fi

      - name: Assemble package
        run: |
          V=$(python -c "import re;print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('bibleclip/_version.py').read()).group(1))")
          if [ -d dist/BibleClipWeb.app ]; then
            APP="dist/BibleClipWeb.app"
          else
            APP="dist/BibleClipWeb/BibleClipWeb.app"
          fi
          # Data INSIDE the bundle (Contents/MacOS) — config.candidate_data_roots
          # checks the executable dir, so it's found there even after the app moves.
          MACOS="$APP/Contents/MacOS"
          mkdir -p "$MACOS/bible_versions" && cp bible_versions/KRV.SQLite3 "$MACOS/bible_versions/"
          # Copyright guard: only the copyright-clean 개역한글S (lexicons are user modules).
          mkdir -p "$MACOS/original_lang" && cp "original_lang/개역한글S.sdb" "$MACOS/original_lang/"
          # Stamp the real version into Info.plist (PyInstaller leaves 0.0.0)
          PLIST="$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $V" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $V" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $V" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $V" "$PLIST"
          # Re-sign ad-hoc (copying data invalidated PyInstaller's signature, which
          # otherwise makes macOS report the app as "damaged").
          codesign --force --deep --sign - "$APP" || echo "codesign failed (continuing)"
          # ditto (NOT cp -R) preserves the signature.
          OUT="BibleClipWeb-mac"
          rm -rf "$OUT" && mkdir -p "$OUT"
          ditto "$APP" "$OUT/BibleClipWeb.app"
          cp 사용법.txt "$OUT/"
          cp 사용법.html 사용법.css 사용법.js version_changes.json "$OUT/" 2>/dev/null || true
          # zip — used by the in-app auto-updater
          ( cd "$OUT" && zip -r -y "../BibleClipWeb-macos-v$V.zip" . )
          # dmg — friendly drag-to-Applications installer
          STAGE="dmg_stage"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          ditto "$APP" "$STAGE/BibleClipWeb.app"
          cp 사용법.txt "$STAGE/"
          cp 사용법.html 사용법.css 사용법.js version_changes.json "$STAGE/" 2>/dev/null || true
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "BibleClipWeb" -srcfolder "$STAGE" -ov \
            -format UDZO "BibleClipWeb-macos-v$V.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            BibleClipWeb-macos-*.zip
            BibleClipWeb-macos-*.dmg

  # -------------------------------------------------------------------
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Attach builds to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/*.zip
            macos/*.zip
            macos/*.dmg
